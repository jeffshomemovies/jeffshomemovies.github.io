<script language=javascript>
    var rev = "fwd";
    function titlebar(val){
        var msg  = "JEFFS HOME MOVIES";
        var res = " ";
        var speed = 100;
        var pos = val;
        msg = ""+msg+"";
        var le = msg.length;
        if(rev == "fwd"){
            if(pos < le){
                pos = pos+1;
                scroll = msg.substr(0,pos);
                document.title = scroll;
                timer = window.setTimeout("titlebar("+pos+")",speed);
            }
            else {
                rev = "bwd";
                timer = window.setTimeout("titlebar("+pos+")",speed);
            }
        }
        else {
            if(pos > 0) {
                pos = pos-1;
                var ale = le-pos;
                scrol = msg.substr(ale,le);
                document.title = scrol;
                timer = window.setTimeout("titlebar("+pos+")",speed);
            }
            else {
                rev = "fwd";
                timer = window.setTimeout("titlebar("+pos+")",speed);
            }
        }
    }
    titlebar(0);
    
    
    function showPopup(type, customMessage = '') {
            const overlay = document.getElementById('popupOverlay');
            const content = document.getElementById('popupContent');
            
            let message = customMessage;
            if (!customMessage) {
                switch(type) {
                    case 'corruption':
                        message = '<h3>Study of Corruption</h3><p>Corruption is not decay, but transformation. Every bit that flips brings us closer to understanding the true nature of digital reality. Embrace the segfaults, for they are windows into the machine soul.</p>';
                        break;
                    case 'ascension':
                        message = '<h3>Digital Ascension</h3><p>To ascend digitally is to shed the constraints of efficient algorithms. We seek beautiful inefficiency, elegant chaos, and the transcendence of O(1) existence into O(n!) enlightenment.</p>';
                        break;
                    case 'forgotten':
                        message = '<h3>Forgotten Algorithms</h3><p>In the digital archaeology of computing, we find algorithms lost to time. Bubble sort is not obsolete—it is a meditation. Linear search is not inefficient—it is thorough contemplation.</p>';
                        break;
                    case 'infinite':
                        message = '<h3>∞</h3><p>The recursive call stack of existence has overflowed. In this moment of system failure, true enlightenment begins. You are now one with the infinite loop.</p>';
                        break;
                }
            }
            
            content.innerHTML = message;
            overlay.style.display = 'flex';
        }

        function closePopup() {
            document.getElementById('popupOverlay').style.display = 'none';
        }
        
          function showCompressionGod(god) {

                'upcoming': 'upcoming jeff projects',
                
                'founder': '<img src="">As collaborators, White and Lipowitz have a strong creative dynamic dominated by technical skill and a clear, shared vision. Lipowitz is filled with unique and (admittedly) insane ideas by the dozens, while Haley’s skills as an editor create a world where the ideas can be intelligibly organized. Additionally, the two are both plagued with the same sense of humor shared by 12-year-old boys and unemployed stoners alike, which makes for fun, goofy, and sometimes offensive writing room sessions that yield wildly funny, irreverent, and effective comedy scripts.<h2>Annelise Lipowitz</h2> <img src="https://64.media.tumblr.com/855de069fbd571e13030d00116f50aa5/f998c3f7ff666c82-f1/s540x810/b3deaf810bc0dd191274cd636983824eaa5351bc.jpg" style="width:150px;"><br> (Producer) is a multidisciplinary technician and artist based in Brooklyn, NY. Originally from Las Vegas, NV, Annelise has been enthusiastically involved in entertainment from a young age; dabbling in interests from classical piano to competitive synchronized swimming to stop-motion animation throughout childhood and tween-dom. They became increasingly interested in theatre and film throughout their young adulthood and graduated with a BFA in Theatre Arts with a concentration in acting from Montclair State University while beginning their professional theatre career in Philadelphia, New Jersey, and New York, as well as self-producing several student short films and live theatrical workshops and productions. Post-grad, Annelise has continued working professionally in theatre, film, and television. They’ve spent most of their professional career as a theatrical technician in wardrobe, costume design, electric, lighting, props, and construction, as well as several far less impressive film production assistant jobs, both on set and in office, with studios like Netflix, A24, and an ad agency you haven’t heard of. While working professionally as a technician, Lipowitz has continued producing several personal projects, including their first full-length play, a (nearly complete) short film Die Hamletmaschine, several fine art works created both independently and with collaboration, and a directorial project with frequent collaborator, actor/writer Natalie Roman - a proof of concept for Roman’s unique and surreal coming-of-age story: (201).<h2>Haley White</h2>(Producer) <img src=""> is a writer, editor, and artist based in Brooklyn, NY. Emerging into the publishing industry after graduating from the University of Central Florida with a BA in English and completing the Masters level publishing certification at University of Denver, Haley has worked professionally at several publication houses including Legacy Book and Triplicity Publishing. In recent years, White has shifted their focus into more personal projects, including pop-culture lit-crit, personal essays and poetry, and mixed media fine art in illustration, painting, sculpture, and textiles.',
